version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/forecastify

permissions:
  - object: /home/ec2-user/forecastify
    owner: ec2-user
    group: ec2-user
    mode: '755'
    type:
      - directory
      - file

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300

  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 300

  ApplicationStop:
    - location: scripts/application_stop.sh
      timeout: 300
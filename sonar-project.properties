# Project Identification
sonar.projectKey=forecastify
sonar.projectName=Forecastify
sonar.projectVersion=0.1.0

# Source Configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Language & Encoding
sonar.language=ts
sonar.sourceEncoding=UTF-8

# TypeScript / JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions — skip build artifacts, dependencies, and config files
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  public/**,\
  coverage/**,\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/*.d.ts
